; ============================================================================
;  Etch-A-Synth  --  Interactive Visual Synthesizer
;  Target: Arduino Nano V3 (ATmega328P, 16 MHz, 32 KB Flash, 2 KB SRAM)
; ============================================================================
[platformio]
default_envs = nanoatmega328new

[env:nanoatmega328]
platform        = atmelavr
board           = nanoatmega328
framework       = arduino

; Most clone Nanos ship with the OLD bootloader. If your board has the NEW
; bootloader, switch the env to [env:nanoatmega328new] (upload_speed 115200).
upload_speed    = 57600
monitor_speed   = 115200

; ---- Library dependencies (resolved automatically by PlatformIO) ----
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit GFX Library @ ^1.11.11
    adafruit/Adafruit BusIO @ ^1.16.1
    Wire

; ---- Build flags ----
;  * We shrink the SSD1306 page-buffer code path and keep optimisation for size.
build_flags =
    -Os
    -DSSD1306_NO_SPLASH        ; we draw our own splash; saves a little flash

; Optional: uncomment to use the lighter env for new-bootloader clones
[env:nanoatmega328new]
extends         = env:nanoatmega328
board           = nanoatmega328new
upload_speed    = 115200
